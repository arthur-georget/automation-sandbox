name: Maven Package

on:
  workflow_dispatch:
  push:
    branches: [ "preprod" ]
  workflow_run:
    workflows: ["Auto Merge to Preprod"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github 
        settings-path: ${{ github.workspace }}

    - name: Build with Maven
      run: mvn -B clean package --file sandbox/pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -f sandbox/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
